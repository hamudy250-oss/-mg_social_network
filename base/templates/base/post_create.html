<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء منشور جديد | MG Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(124, 58, 237, 0.22); }
        .bottom-nav { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 60; display: flex; gap: 0.85rem; background: #0b0e14; border: 1px solid rgba(124, 58, 237, 0.25); border-radius: 999px; padding: 0.85rem 1rem; }
        .bottom-nav a { width: 3.25rem; height: 3.25rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: transparent; color: #c4c8d5; }
        .bottom-nav-center { width: 4rem; height: 4rem; background: #7c3aed; color: #fff; }
    </style>
</head>
<body class="min-h-screen pt-6 pb-28">
    <div class="container mx-auto px-4">
        <div class="glass-card rounded-[32px] p-6 shadow-xl">
            <div class="flex items-center justify-between gap-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">منشور جديد</h1>
                    <p class="text-sm text-slate-400">شارك ما يدور في ذهنك بطريقة أنيقة وفورية.</p>
                </div>
                <a href="{% url 'home' %}" class="inline-flex items-center gap-2 rounded-2xl border border-slate-700 bg-[#111827] px-4 py-3 text-sm text-slate-200 hover:bg-[#16202f]"><i class="fas fa-arrow-right"></i> العودة</a>
            </div>
            {% if errors %}
            <div class="mb-6 rounded-3xl border border-red-500 bg-[#422e3f] p-4 text-sm text-red-200">
                <ul class="space-y-2">
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-slate-300">عنوان المنشور</label>
                    <input name="title" type="text" placeholder="اكتب عنوانًا جذابًا" class="mt-3 w-full rounded-3xl border border-slate-700 bg-[#0b1120] px-4 py-3 text-sm text-white outline-none focus:border-purple-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300">المحتوى</label>
                    <textarea name="content" rows="6" placeholder="ما هي الفكرة؟" class="mt-3 w-full rounded-3xl border border-slate-700 bg-[#0b1120] px-4 py-4 text-sm text-white outline-none focus:border-purple-500" required></textarea>
                </div>
                <button type="submit" class="w-full rounded-full bg-gradient-to-r from-purple-500 to-fuchsia-500 px-6 py-4 text-sm font-semibold text-white transition hover:scale-[1.02]">نشر الآن</button>
            </form>
        </div>
    </div>
    <div class="bottom-nav lg:hidden" role="navigation" aria-label="تنقل أسفل الشاشة">
        <a href="{% url 'home' %}" title="الرئيسية"><i class="fa-solid fa-house"></i></a>
        <a href="{% url 'conversations' %}" title="الرسائل"><i class="fa-solid fa-paper-plane"></i></a>
        <a href="{% url 'post_create' %}" class="bottom-nav-center" title="منشور جديد"><i class="fa-regular fa-square-plus"></i></a>
        <a href="{% url 'notifications' %}" title="الإشعارات"><i class="fa-regular fa-bell"></i></a>
        <a href="{% url 'profile_detail' request.user.username %}" title="الملف الشخصي"><i class="fa-regular fa-user"></i></a>
    </div>
</body>
</html>
