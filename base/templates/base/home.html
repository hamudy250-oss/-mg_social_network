<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Social Network | Coming Soon</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.2);

            padding: 48px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.35);

        h1 {
            margin: 0 0 16px;
            font-size: 3rem;
            letter-spacing: -0.05em;
        }
        p.lead {
            margin: 0 0 24px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #cbd5e1;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            background: rgba(148, 163, 184, 0.12);
            border-radius: 9999px;
            color: #e2e8f0;
            font-weight: 600;
            margin-top: 24px;
        }
        .brand span {
            color: #38bdf8;
        }

<body>
    <div class="card">
        <h1>MG Social Network</h1>
        <p class="lead">A sleek new social experience is being built for modern communities. We are crafting thoughtful connections, clean design, and an intuitive platform for your next digital network.</p>
